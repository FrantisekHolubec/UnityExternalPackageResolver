name: Build Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore
        run: dotnet restore ExternalPackages.csproj

      - name: Build project
        run: dotnet build ExternalPackages.csproj -c Release --no-restore

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: bin/Release/net472/ExternalPackages.dll
          retention-days: 5

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/net472/ExternalPackages.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}